services:
- type: worker
  name: telegram-bot
  env: python
  buildCommand: pip install -r requirements.txt
  startCommand: python main.py
  envVars:
    - key: BOT_TOKEN
      sync: false
    - key: ADMIN_IDS
      sync: false
    - key: ADMIN_CONTACT_ID
      sync: false
    - key: BITCOIN_ADDRESS
      sync: false